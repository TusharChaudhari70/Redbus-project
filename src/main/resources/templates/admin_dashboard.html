<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
.sidebar {
	height: 100vh;
	background: #2c3e50;
	color: white;
	padding-top: 20px;
}

.nav-link {
	color: white;
	margin: 10px 0;
}

.nav-link:hover {
	background: #34495e;
}

.header-red {
	background: #d84e55;
	color: white;
	padding: 15px;
	border-radius: 5px;
}
</style>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<div class="col-md-2 sidebar">
				<h3 class="text-center">Admin</h3>
				<hr>
				<a class="nav-link" href="#"><i class="fa fa-bus me-2"></i>
					Manage Buses</a> <a class="nav-link" href="#"><i
					class="fa fa-users me-2"></i> View Users</a> <a
					class="nav-link text-danger" href="/logout"><i
					class="fa fa-sign-out me-2"></i> Logout</a>
			</div>

			<div class="col-md-10 p-4">
				<div class="header-red mb-4">
					<h2>Bus Management System</h2>
				</div>

				<form action="/admin/saveBus" method="POST" class="row g-3">
					<div class="col-md-2">
						<input type="text" name="busName" class="form-control"
							placeholder="Bus Name">
					</div>
					<div class="col-md-2">
						<input type="text" name="busNumber" class="form-control"
							placeholder="Bus Number">
					</div>
					<div class="col-md-2">
						<input type="text" name="source" class="form-control"
							placeholder="From">
					</div>
					<div class="col-md-2">
						<input type="text" name="destination" class="form-control"
							placeholder="To">
					</div>
					<div class="col-md-2">
						<input type="text" name="departureTime" class="form-control"
							placeholder="Time">
					</div>
					<div class="col-md-1">
						<input type="number" name="price" class="form-control"
							placeholder="Price">
					</div>
					<div class="col-md-1">
						<input type="number" name="availableSeats" class="form-control"
							placeholder="Seats">
					</div>
					<div class="col-md-1">
						<button class="btn btn-success">
							<i class="fa fa-plus"></i>
						</button>
					</div>
				</form>
				<table class="table table-hover border">
					<thead class="table-dark">
						<tr>
							<th>Bus</th>
							<th>Number</th>
							<th>Route</th>
							<th>Fare</th>
							<th>Seats</th>
							<th>Action</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="bus : ${buses}">
							<td><img
								src="https://img.icons8.com/color/48/000000/bus.png" width="30">
								<span th:text="${bus.busName}"></span></td>
							<td th:text="${bus.busNumber}"></td>
							<td th:text="${bus.source + ' ➔ ' + bus.destination}"></td>
							<td th:text="${'₹' + bus.price}"></td>
							<td th:text="${bus.availableSeats}"></td>
							<td><a th:href="@{'/admin/delete/' + ${bus.id}}"
								class="btn btn-outline-danger btn-sm"><i class="fa fa-trash"></i></a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</body>
</html>
