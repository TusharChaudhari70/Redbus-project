<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - redBus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --rb-red: #d84e55; }
        body { background-color: #f4f7f8; font-family: 'Segoe UI', sans-serif; }
        .search-header { background: white; padding: 15px 0; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .bus-card { background: white; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; padding: 20px; transition: 0.3s; }
        .bus-card:hover { border-color: var(--rb-red); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .seat { height: 35px; width: 35px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; background: white; }
        .seat.selected { background: #28a745 !important; color: white; border-color: #28a745; }
        .seat.booked { background: #eee; cursor: not-allowed; color: #ccc; }
        .btn-select { background: var(--rb-red); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header class="search-header">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html"><img src="https://st.redbus.in/Images/rdc/rdc-redbus-logo.svg" height="35"></a>
            <div class="bg-light px-4 py-1 rounded-pill border fw-bold">
                <span id="fromDisplay">From</span> → <span id="toDisplay">To</span>
            </div>
            <div></div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-3">
                <div class="bg-white p-3 rounded-3 shadow-sm">
                    <h6>Filters</h6><hr>
                    <div class="form-check"><input class="form-check-input" type="checkbox"><label>AC</label></div>
                    <div class="form-check"><input class="form-check-input" type="checkbox"><label>Sleeper</label></div>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="bus-card">
                    <div class="row align-items-center">
                        <div class="col-md-4"><h5 class="fw-bold">Neeta Travels</h5><p class="small text-muted">A/C Sleeper (2+1)</p></div>
                        <div class="col-md-4 text-center"><h5>21:00 — 05:30</h5><p class="small">08h 30m</p></div>
                        <div class="col-md-4 text-md-end">
                            <h4 class="fw-bold">₹ 1,250</h4>
                            <button class="btn-select" onclick="openSeats()">SELECT SEAT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="seatModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0"><h5 class="fw-bold">Choose Seats</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body pt-0">
                    <div class="row">
                        <div class="col-md-7 border-end"><div class="row row-cols-4 g-2" id="seatsGrid"></div></div>
                        <div class="col-md-5 bg-light p-4 rounded-3">
                            <h6>Booking Summary</h6>
                            <p>Seats: <span id="selSeats">-</span></p>
                            <h5>Total: <span id="selTotal">₹ 0</span></h5>
                            <button class="btn btn-danger w-100 mt-3 fw-bold" onclick="alert('Proceeding to Checkout...')">PROCEED</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('fromDisplay').innerText = params.get('from');
        document.getElementById('toDisplay').innerText = params.get('to');

        let selected = [];
        function openSeats() {
            const grid = document.getElementById('seatsGrid');
            grid.innerHTML = '';
            for(let i=1; i<=24; i++) {
                const div = document.createElement('div');
                div.className = 'col d-flex justify-content-center';
                div.innerHTML = `<div class="seat" onclick="selectSeat(this, ${i})">${i}</div>`;
                grid.appendChild(div);
            }
            new bootstrap.Modal(document.getElementById('seatModal')).show();
        }

        function selectSeat(el, num) {
            el.classList.toggle('selected');
            if(el.classList.contains('selected')) { selected.push(num); }
            else { selected = selected.filter(n => n !== num); }
            document.getElementById('selSeats').innerText = selected.join(', ');
            document.getElementById('selTotal').innerText = '₹ ' + (selected.length * 1250);
        }
    </script>
</body>
</html>
