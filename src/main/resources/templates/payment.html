<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Secure Payment | redBus Pro</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
	rel="stylesheet">

<style>
:root {
	--rb-red: #D84E55;
	--rb-dark: #1F222F;
	--rb-bg: #f4f7f8;
}

body {
	background: var(--rb-bg);
	font-family: 'Plus Jakarta Sans', sans-serif;
}

.method-card {
	border: 2px solid #eee;
	border-radius: 20px;
	padding: 25px;
	cursor: pointer;
	background: white;
	margin-bottom: 20px;
	transition: 0.3s;
	position: relative;
}

.method-card.active {
	border-color: var(--rb-red);
	background: #fffafa;
	box-shadow: 0 10px 20px rgba(216, 78, 85, 0.05);
}

.method-card.active::after {
	content: '\F26E';
	family: "bootstrap-icons";
	position: absolute;
	top: 20px;
	right: 20px;
	color: var(--rb-red);
	font-size: 1.2rem;
}

.summary-box {
	background: var(--rb-dark);
	color: white;
	border-radius: 25px;
	padding: 35px;
	position: sticky;
	top: 20px;
}

.btn-pay {
	background: var(--rb-red);
	color: white;
	border: none;
	width: 100%;
	padding: 18px;
	border-radius: 15px;
	font-weight: 800;
	transition: 0.3s;
	font-size: 1.1rem;
}

.btn-pay:hover:not(:disabled) {
	background: #be3e44;
	transform: translateY(-2px);
	box-shadow: 0 5px 15px rgba(216, 78, 85, 0.3);
}

.btn-pay:disabled {
	background: #ccc;
	cursor: not-allowed;
}

#qrSection, #cardSection {
	display: none;
	margin-top: 20px;
	padding: 25px;
	border-radius: 15px;
	background: #ffffff;
	border: 1px solid #eee;
}

.card-input {
	border-radius: 12px;
	padding: 12px;
	border: 1px solid #ddd;
	font-weight: 600;
}

.card-input:focus {
	border-color: var(--rb-red);
	box-shadow: none;
}

.qr-img {
	width: 200px;
	height: 200px;
	border-radius: 15px;
	padding: 10px;
	background: white;
	border: 1px solid #eee;
}

.timer-badge {
	background: #fff5f5;
	color: var(--rb-red);
	border: 1px solid #feb2b2;
	padding: 8px 15px;
	border-radius: 10px;
	font-weight: 700;
}
</style>
</head>
<body>

	<div class="container mt-5 pb-5">
		<div class="row g-4">
			<div class="col-md-7">
				<h3 class="fw-800 mb-4">Payment Method</h3>

				<div class="method-card" id="upiTab" onclick="switchMethod('upi')">
					<div class="d-flex align-items-center">
						<div class="bg-light p-3 rounded-3 me-3">
							<i class="bi bi-qr-code-scan fs-4 text-danger"></i>
						</div>
						<div>
							<h6 class="fw-bold mb-0">UPI Scan & Pay</h6>
							<small class="text-muted">Google Pay, PhonePe, Paytm, Any
								UPI App</small>
						</div>
					</div>

					<div id="qrSection" class="text-center">
						<div class="mb-3">
							<img
								th:src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=redbus@upi&am=' + ${amount} + '&tn=BusBooking'"
								alt="UPI QR" class="qr-img shadow-sm">
						</div>
						<div class="timer-badge d-inline-block">
							<i class="bi bi-clock-history me-2"></i> Expires in <span
								id="countdown">05:00</span>
						</div>
					</div>
				</div>

				<div class="method-card" id="cardTab" onclick="switchMethod('card')">
					<div class="d-flex align-items-center">
						<div class="bg-light p-3 rounded-3 me-3">
							<i class="bi bi-credit-card-2-front fs-4 text-danger"></i>
						</div>
						<div>
							<h6 class="fw-bold mb-0">Credit / Debit Card</h6>
							<small class="text-muted">Visa, Mastercard, RuPay,
								Maestro</small>
						</div>
					</div>

					<div id="cardSection">
						<div class="row g-3">
							<div class="col-12">
								<label class="small fw-bold text-muted mb-1">CARD NUMBER</label>
								<input type="text" id="cardNumber"
									class="form-control card-input"
									placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
							</div>
							<div class="col-12">
								<label class="small fw-bold text-muted mb-1">CARD HOLDER
									NAME</label> <input type="text" id="cardName"
									class="form-control card-input"
									placeholder="As printed on card">
							</div>
							<div class="col-md-6 col-6">
								<label class="small fw-bold text-muted mb-1">EXPIRY DATE</label>
								<input type="text" id="cardExpiry"
									class="form-control card-input" placeholder="MM/YY"
									maxlength="5">
							</div>
							<div class="col-md-6 col-6">
								<label class="small fw-bold text-muted mb-1">CVV</label> <input
									type="password" id="cardCvv" class="form-control card-input"
									placeholder="***" maxlength="3">
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="col-md-5">
				<div class="summary-box shadow-lg">
					<h5 class="fw-bold mb-4">
						<i class="bi bi-ticket-perforated me-2 text-danger"></i> Booking
						Summary
					</h5>
					<div class="d-flex justify-content-between mb-3 opacity-75">
						<span>Selected Seats</span> <span class="fw-bold"
							th:text="${seats}">None</span>
					</div>
					<div class="d-flex justify-content-between mb-3 opacity-75">
						<span>Tax & Fees</span> <span class="fw-bold">₹ 0.00</span>
					</div>
					<hr style="border-top: 2px dashed rgba(255, 255, 255, 0.3);">
					<div class="d-flex justify-content-between mb-4 mt-2">
						<span class="fs-5 fw-bold">Grand Total</span> <span
							class="fs-2 fw-bold text-danger">₹ <span
							th:text="${amount}">0</span></span>
					</div>

					<button id="mainBtn" class="btn-pay" onclick="handlePayment()"
						disabled>PLEASE SELECT A METHOD</button>
					<p class="text-center small mt-3 opacity-50 mb-0">
						<i class="bi bi-shield-lock-fill me-1"></i> 256-bit Secure
						Encryption
					</p>
				</div>
			</div>
		</div>
	</div>
	

	<script th:inline="javascript">
    let currentMethod = '';

    // Card Number Formatting (Adds spaces after 4 digits)
    document.getElementById('cardNumber').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    // Expiry Date Formatting (Adds / after 2 digits)
    document.getElementById('cardExpiry').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{2})/g, '$1/').replace(/\/$/, '');
    });

    function switchMethod(method) {
        currentMethod = method;
        document.getElementById('upiTab').classList.remove('active');
        document.getElementById('cardTab').classList.remove('active');
        document.getElementById('qrSection').style.display = 'none';
        document.getElementById('cardSection').style.display = 'none';

        if(method === 'upi') {
            document.getElementById('upiTab').classList.add('active');
            document.getElementById('qrSection').style.display = 'block';
            document.getElementById('mainBtn').innerText = 'I HAVE PAID (UPI)';
            startTimer(300);
        } else {
            document.getElementById('cardTab').classList.add('active');
            document.getElementById('cardSection').style.display = 'block';
            document.getElementById('mainBtn').innerText = 'PAY SECURELY (CARD)';
        }
        document.getElementById('mainBtn').disabled = false;
    }

    function handlePayment() {
        const btn = document.getElementById('mainBtn');
        
        // VALIDATION FOR CARD
        if (currentMethod === 'card') {
            const num = document.getElementById('cardNumber').value;
            const name = document.getElementById('cardName').value;
            const exp = document.getElementById('cardExpiry').value;
            const cvv = document.getElementById('cardCvv').value;

            if (num.length < 19 || name === "" || exp.length < 5 || cvv.length < 3) {
                alert("Please fill all card details correctly!");
                return;
            }
        }

        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> SECURING TRANSACTION...';
        btn.disabled = true;

        const seats = /*[[${seats}]]*/ 'LS1';
        const amount = /*[[${amount}]]*/ '0';

        setTimeout(() => {
            window.location.href = "/paymentSuccess?seats=" + seats + "&amount=" + amount;
        }, 3000);
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const display = document.getElementById('countdown');
        const countdownInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            seconds = seconds < 10 ? "0" + seconds : seconds;
            display.textContent = minutes + ":" + seconds;
            if (--timer < 0) clearInterval(countdownInterval);
        }, 1000);
    }
</script>
</body>
</html>
