<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ticket Confirmed | redBus Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --rb-red: #D84E55; }
        body { background: #f4f7f6; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        
        /* Ticket Design */
        #ticket-element {
            background: white; border-radius: 20px; max-width: 500px; margin: 0 auto; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .ticket-header { background: var(--rb-red); color: white; padding: 25px; text-align: center; }
        .dashed-line { border-top: 2px dashed #ddd; margin: 20px 0; position: relative; }
        .dashed-line::before, .dashed-line::after {
            content: ''; position: absolute; width: 20px; height: 20px; 
            background: #f4f7f6; border-radius: 50%; top: -10px;
        }
        .dashed-line::before { left: -10px; }
        .dashed-line::after { right: -10px; }
        .qr-code { width: 120px; border: 1px solid #eee; padding: 8px; border-radius: 10px; }
        .btn-group-custom { max-width: 500px; margin: 20px auto; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="ticket-element">
        <div class="ticket-header">
            <div class="mb-2"><i class="bi bi-patch-check-fill fs-1"></i></div>
            <h3 class="fw-bold mb-0">Booking Successful!</h3>
            <small class="opacity-75">M-Ticket ID: RBPRO-992288</small>
        </div>

        <div class="p-4">
            <div class="row mb-4">
                <div class="col-6">
                    <small class="text-muted fw-bold d-block">BOARDING FROM</small>
                    <span class="fw-bold text-dark fs-5">MUMBAI (Sion)</span>
                    <div class="small text-muted">Time: 09:30 PM</div>
                </div>
                <div class="col-6 text-end">
                    <small class="text-muted fw-bold d-block">DROPPING AT</small>
                    <span class="fw-bold text-dark fs-5">PUNE (Wakad)</span>
                    <div class="small text-muted">ETA: 01:00 AM</div>
                </div>
            </div>

            <div class="dashed-line"></div>

            <div class="row align-items-center">
                <div class="col-7">
                    <div class="mb-3">
                        <small class="text-muted fw-bold d-block">SEAT NUMBERS</small>
                        <span class="fw-bold fs-5 text-danger" th:text="${seats}">LS1, LS2</span>
                    </div>
                    <div>
                        <small class="text-muted fw-bold d-block">TOTAL FARE PAID</small>
                        <span class="fw-bold fs-4 text-success">₹ <span th:text="${amount}">0</span></span>
                    </div>
                </div>
                <div class="col-5 text-end">
                    <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Ticket:' + ${seats}" class="qr-code">
                </div>
            </div>

            <div class="mt-4 p-3 bg-light rounded-3 text-center">
                <small class="text-muted"><i class="bi bi-info-circle me-1"></i> Please carry a valid ID proof during boarding.</small>
            </div>
        </div>
    </div>

    <div class="btn-group-custom">
        <button onclick="downloadPDF()" class="btn btn-dark flex-fill py-3 rounded-pill fw-bold shadow">
            <i class="bi bi-file-earmark-pdf me-2"></i>DOWNLOAD PDF
        </button>
        <button onclick="window.print()" class="btn btn-outline-danger flex-fill py-3 rounded-pill fw-bold shadow">
            <i class="bi bi-printer me-2"></i>PRINT
        </button>
    </div>
    
    <div class="text-center mt-3">
        <a href="/" class="text-decoration-none text-muted fw-bold small"><i class="bi bi-house-door me-1"></i> BACK TO HOME</a>
    </div>
    
          

    <script>
        function downloadPDF() {
            const element = document.getElementById('ticket-element');
            const options = {
                margin:       10,
                filename:     'redBus_Pro_Ticket.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Download process
            html2pdf().set(options).from(element).save();
        }
    </script>

</body>
</html>
